<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Steward Wallet | Secure Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #4F46E5; --bg: #F9FAFB; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            -webkit-tap-highlight-color: transparent;
            overflow-x: hidden;
        }

        /* --- PREMIUM ANIMATIONS --- */
        .modal-enter { animation: modalSlide 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes modalSlide {
            from { opacity: 0; transform: translateY(20px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .glass-blur {
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            background: rgba(255, 255, 255, 0.75);
        }

        /* --- MOBILE OPTIMIZATION --- */
        .safe-area-bottom { padding-bottom: env(safe-area-inset-bottom); }

        .service-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid rgba(0,0,0,0.04);
        }
        .service-card:active { transform: scale(0.97); background: #f3f4f6; }

        [x-cloak] { display: none !important; }
    </style>
</head>
<body x-data="{
    currency: '$',
    showError: false,
    activeService: '',
    triggerError(name) {
        this.activeService = name;
        this.showError = true;
    }
}">

    <nav class="sticky top-0 z-40 glass-blur border-b border-gray-100">
        <div class="max-w-7xl mx-auto px-5 h-16 flex justify-between items-center">
            <div class="flex items-center gap-4">
                <a href="./redeem.html"><button class="bg-indigo-600 text-white text-[13px] font-bold px-5 py-2 rounded-full shadow-lg shadow-indigo-200 active:scale-95 transition-transform">
                    Redeem
                </button></a>
            </div>

            <div class="flex items-center gap-3">
                <select x-model="currency" class="bg-gray-100 border-none text-[13px] font-semibold py-1.5 px-3 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
                    <option value="$">USD ($)</option>
                    <option value="£">GBP (£)</option>
                    <option value="€">EUR (€)</option>
                </select>
                <div class="w-8 h-8 rounded-full bg-gradient-to-tr from-gray-200 to-gray-300 border border-white shadow-sm"></div>
            </div>
        </div>
    </nav>

    <main class="max-w-xl mx-auto px-5 pt-8 pb-24">

        <section class="mb-10 text-center">
            <h2 class="text-gray-400 text-[11px] font-bold uppercase tracking-[2px] mb-2">Total Balance</h2>
            <div class="flex items-center justify-center gap-1 mb-4">
                <span class="text-4xl font-extrabold text-gray-900" x-text="currency"></span>
                <span class="text-6xl font-extrabold text-gray-900 tracking-tighter">0.00</span>
            </div>
            <div class="bg-white rounded-3xl p-8 border border-gray-100 shadow-sm">
                <p class="text-gray-500 text-[15px] leading-relaxed">
                    Your wallet is empty. <br> <span class="text-indigo-600 font-semibold">Redeem a gift card</span> to enable bill payments and premium services.
                </p>
            </div>
        </section>

        <section>
            <h3 class="text-gray-900 text-lg font-bold mb-5 px-1">Pay Bills & Services</h3>
            <div class="grid grid-cols-2 gap-4">

                <button @click="triggerError('Public Transport')" class="service-card bg-white p-6 rounded-[28px] text-left">
                    <div class="w-12 h-12 bg-blue-50 rounded-2xl flex items-center justify-center text-blue-600 mb-4">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4"/></svg>
                    </div>
                    <span class="block text-sm font-bold text-gray-800">Transport</span>
                </button>

                <button @click="triggerError('Streaming Sub')" class="service-card bg-white p-6 rounded-[28px] text-left">
                    <div class="w-12 h-12 bg-purple-50 rounded-2xl flex items-center justify-center text-purple-600 mb-4">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg>
                    </div>
                    <span class="block text-sm font-bold text-gray-800">Streaming</span>
                </button>

                <button @click="triggerError('Mobile Top-up')" class="service-card bg-white p-6 rounded-[28px] text-left">
                    <div class="w-12 h-12 bg-emerald-50 rounded-2xl flex items-center justify-center text-emerald-600 mb-4">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 18h.01M8 21h8a2 2 0 002-2V5a2 2 0 00-2-2H8a2 2 0 00-2 2v14a2 2 0 002 2z"/></svg>
                    </div>
                    <span class="block text-sm font-bold text-gray-800">Mobile</span>
                </button>

                <button @click="triggerError('Gift Card Purchase')" class="service-card bg-white p-6 rounded-[28px] text-left">
                    <div class="w-12 h-12 bg-orange-50 rounded-2xl flex items-center justify-center text-orange-600 mb-4">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v13m0-13V6a2 2 0 112 2h-2zm0 0V5.5A2.5 2.5 0 109.5 8H12zm-7 4h14M5 12a2 2 0 110-4h14a2 2 0 110 4M5 12v7a2 2 0 002 2h10a2 2 0 002-2v-7"/></svg>
                    </div>
                    <span class="block text-sm font-bold text-gray-800">Buy Cards</span>
                   Apple • iTunes • Google Play

                </button>

            </div>
        </section>
    </main>

    <div x-show="showError" x-cloak class="fixed inset-0 z-50 flex items-end sm:items-center justify-center p-4">
        <div x-show="showError" @click="showError = false" class="fixed inset-0 bg-black/40 backdrop-blur-sm transition-opacity"></div>

        <div x-show="showError" class="modal-enter w-full max-w-sm bg-white rounded-[32px] overflow-hidden shadow-2xl relative z-10 safe-area-bottom">
            <div class="p-8 text-center">
                <div class="w-16 h-16 bg-red-50 text-red-500 rounded-full flex items-center justify-center mx-auto mb-6">
                    <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/></svg>
                </div>
                <h3 class="text-xl font-extrabold text-gray-900 mb-2">Insufficient Balance</h3>
                <p class="text-gray-500 text-sm leading-relaxed mb-8">
                    To process your <span class="text-gray-900 font-bold" x-text="activeService"></span> request, you need to add funds. Your current balance is <span x-text="currency"></span>0.00.
                </p>
                <div class="flex flex-col gap-3">
                    <button @click="showError = false" class="w-full bg-indigo-600 text-white font-bold py-4 rounded-2xl shadow-lg shadow-indigo-100 active:scale-95 transition-transform">
                        Redeem Gift Card
                    </button>
                    <button @click="showError = false" class="w-full text-gray-400 font-bold py-2 text-sm">
                        Dismiss
                    </button>
                </div>
            </div>
        </div>
    </div>

    <footer class="fixed bottom-0 w-full glass-blur border-t border-gray-100 safe-area-bottom z-30">
        <div class="flex justify-around items-center h-16">
            <div class="flex flex-col items-center text-indigo-600">
                <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/></svg>
                <span class="text-[10px] font-bold mt-1 uppercase">Wallet</span>
            </div>
            <!-- <div class="flex flex-col items-center text-gray-400">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                <span class="text-[10px] font-bold mt-1 uppercase">Earn</span>
            </div> -->
            <div class="flex flex-col items-center text-gray-400">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
               <a href="./user.profile.html"> <span class="text-[10px] font-bold mt-1 uppercase">Profile</span></a>
            </div>
        </div>
    </footer>

</body>
</html>
